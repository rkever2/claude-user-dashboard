<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <clipPath id="left-half">
      <rect x="0" y="0" width="15" height="32"/>
    </clipPath>
    <clipPath id="right-half">
      <rect x="17" y="0" width="15" height="32"/>
    </clipPath>
  </defs>

  <!-- Left half: Claude sparkle/asterisk -->
  <g clip-path="url(#left-half)">
    <!-- Simplified Claude asterisk shape centered at x=8 -->
    <g transform="translate(8, 16)">
      <!-- Vertical stroke -->
      <rect x="-1.5" y="-10" width="3" height="20" rx="1.5" fill="#D97757"/>
      <!-- Horizontal stroke -->
      <rect x="-10" y="-1.5" width="20" height="3" rx="1.5" fill="#D97757"/>
      <!-- Diagonal stroke top-left to bottom-right -->
      <rect x="-1.5" y="-10" width="3" height="20" rx="1.5" fill="#D97757" transform="rotate(45)"/>
      <!-- Diagonal stroke top-right to bottom-left -->
      <rect x="-1.5" y="-10" width="3" height="20" rx="1.5" fill="#D97757" transform="rotate(-45)"/>
    </g>
  </g>

  <!-- Divider line -->
  <rect x="15.5" y="4" width="1" height="24" rx="0.5" fill="#D97757" opacity="0.3"/>

  <!-- Right half: Bar chart -->
  <g clip-path="url(#right-half)">
    <!-- Bar 1 (short) -->
    <rect x="18" y="18" width="3" height="8" rx="0.75" fill="#D97757" opacity="0.5"/>
    <!-- Bar 2 (medium) -->
    <rect x="22.5" y="12" width="3" height="14" rx="0.75" fill="#D97757" opacity="0.75"/>
    <!-- Bar 3 (tall) -->
    <rect x="27" y="7" width="3" height="19" rx="0.75" fill="#D97757"/>
  </g>
</svg>
